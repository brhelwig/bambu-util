name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            goos=${platform%/*}
            goarch=${platform#*/}
            bin=bambu-util
            [ "$goos" = "windows" ] && bin=bambu-util.exe
            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch \
              go build -trimpath -ldflags="-s -w" -o "$bin" ./cmd/bambu-util
            name="bambu-util_${GITHUB_REF_NAME}_${goos}_${goarch}"
            if [ "$goos" = "windows" ]; then
              zip -q "dist/${name}.zip" "$bin" README.md LICENSE
            else
              tar -czf "dist/${name}.tar.gz" "$bin" README.md LICENSE
            fi
            rm "$bin"
          done
          (cd dist && sha256sum -- * > checksums.txt)
      - name: Extract changelog section
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          [ -s release-notes.md ] || echo "See CHANGELOG.md" > release-notes.md
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
