<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111418">
<link rel="manifest" href="/manifest.webmanifest">
<title>P1S bed control</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0 auto;
    font-family: -apple-system, system-ui, sans-serif;
    background: #111418;
    color: #e8eaed;
    padding: max(env(safe-area-inset-top), 12px) 16px 24px;
    max-width: 480px;
  }
  h1 { font-size: 1.1rem; font-weight: 600; margin: 8px 0 16px; }
  .card { background: #1b2027; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.95rem; }
  .row span:first-child { color: #9aa0a6; }
  .ok { color: #7bd88f; }
  .bad { color: #ff6e6e; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .actions button:last-child:nth-child(odd) { grid-column: 1 / -1; }
  button {
    border: 0; border-radius: 10px; padding: 16px 8px;
    font-size: 1rem; font-weight: 600;
    background: #2a313b; color: #e8eaed;
  }
  button:disabled { opacity: 0.4; }
  button.warn { background: #7a4a12; }
  button.danger { background: #6e2222; }
  button.danger.armed { background: #b02a2a; }
  #log { min-height: 1.2em; color: #9aa0a6; font-size: 0.85rem; margin-top: 12px; }
  #cam { width: 100%; border-radius: 12px; display: block; background: #0d0f12; min-height: 120px; }
  .ams-slot { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 0.95rem; }
  .ams-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 1px solid #333; }
  .card h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #9aa0a6; font-weight: 600; margin: 0 0 10px; }
  input[type=range] { width: 100%; margin: 6px 0 2px; accent-color: #c98a2b; }
  input[type=range]:disabled { opacity: 0.4; }
  .iconrow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
  .iconbtn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 13px 4px; }
  .iconbtn svg { width: 26px; height: 26px; display: block; }
  .iconbtn .cap { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.02em; }
  .iconbtn.on { color: #c98a2b; }
  .iconbtn.danger { background: #6e2222; }
  .iconbtn.danger.armed { background: #b02a2a; }
</style>
</head>
<body>
<h1 id="title">P1S bed control</h1>
<div class="card" id="jobCard">
  <h2>Job status</h2>
  <div class="row" id="jobEmpty" style="color:#9aa0a6">No active print</div>
  <div class="row" id="progressRow" style="display:none"><span>Progress</span><span id="progress"></span></div>
  <div class="row" id="jobRow" style="display:none"><span>Job</span><span id="jobName"></span></div>
  <div class="row" id="layerRow" style="display:none"><span>Layer</span><span id="layer"></span></div>
  <div class="row" id="timeRow" style="display:none"><span>Time remaining</span><span id="timeRemaining"></span></div>
</div>
<div class="card">
  <h2>Machine status</h2>
  <div class="row"><span>Connection</span><span id="conn">…</span></div>
  <div class="row"><span>State</span><span id="state">…</span></div>
  <div class="row"><span>Bed</span><span id="bed">…</span></div>
  <div class="row"><span>Nozzle</span><span id="nozzle">…</span></div>
  <div class="row"><span>Chamber</span><span id="chamber">…</span></div>
  <div class="row"><span>Wifi</span><span id="wifi">…</span></div>
  <div class="row"><span>Fans (cool/aux/chamber)</span><span id="fans">…</span></div>
</div>
<div id="hmsBanner" class="card" style="display:none; background:#4a1414; color:#ffb3b3;"></div>
<div class="iconrow" id="row1">
  <button class="iconbtn" id="camBtn" aria-label="Turn camera on">
    <span class="ico"></span><span class="cap">Camera</span></button>
  <button class="iconbtn" id="lampBtn" aria-label="Chamber lamp" disabled>
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 2a6 6 0 0 0-4 10.5c.6.6 1 1.4 1 2.2v.3h6v-.3c0-.8.4-1.6 1-2.2A6 6 0 0 0 12 2z"/></svg></span><span class="cap">Lamp</span></button>
  <button class="iconbtn" id="pauseBtn" data-print-action="pause" aria-label="Pause print" disabled>
    <span class="ico"></span><span class="cap">Pause</span></button>
  <button class="iconbtn danger" id="stopBtn" data-print-action="stop" aria-label="Stop print" disabled>
    <span class="ico"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="3"/></svg></span><span class="cap">Stop</span></button>
</div>
<div class="iconrow" id="row2">
  <button class="iconbtn" data-action="lower-bed" aria-label="Lower bed">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16"/><path d="M12 4v9"/><path d="M8 9l4 4 4-4"/></svg></span><span class="cap">Bed down</span></button>
  <button class="iconbtn" data-action="home" aria-label="Home axes">
    <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg></span><span class="cap">Home</span></button>
  <button class="iconbtn" data-action="extrude" id="extrudeBtn" aria-label="Extrude filament">
    <span class="ico"><svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 4c-2 0-3.4 1.5-3.4 3.3 0 .5.1.9.3 1.3C11 9 9.4 10.6 9.4 12.6c0 .5.1 1 .3 1.5C7.8 14.7 6.3 16.3 6.3 18.3c0 .8.2 1.5.7 2.1C5.1 21 3.7 22.5 3.7 24.4 3.7 26.9 5.9 29 8.6 29h14.8c2.7 0 4.9-2.1 4.9-4.6 0-1.9-1.4-3.4-3.3-4 .4-.6.7-1.3.7-2.1 0-2-1.5-3.6-3.4-4.2.2-.5.3-1 .3-1.5 0-2-1.6-3.6-3.5-4 .2-.4.3-.8.3-1.3C19.4 5.5 18 4 16 4z"/></svg></span><span class="cap">Extrude</span></button>
  <button class="iconbtn" data-action="unload" id="ejectBtn" aria-label="Eject loaded filament" disabled>
    <span class="ico"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5l7 9H5z"/><rect x="5" y="16" width="14" height="3" rx="1.5"/></svg></span><span class="cap">Eject</span></button>
</div>
<div class="card" id="camCard" style="display:none; padding:8px">
  <img id="cam" alt="printer camera">
</div>
<div class="card" id="dryCard" style="margin-top:16px">
  <h2>Bed drying</h2>
  <div class="row"><span>Bed target</span><span id="dryLabel">Off</span></div>
  <input type="range" id="drySlider" min="0" max="6" step="1" value="0">
  <div class="row" id="dryTimerRow" style="display:none; color:#c98a2b; font-size:0.8rem"><span>Auto-off in</span><span id="dryTimer"></span></div>
</div>
<div class="card" id="nozzleCard">
  <h2>Nozzle (cold pull / clean)</h2>
  <div class="row"><span>Nozzle target</span><span id="nozzleLabel">Off</span></div>
  <input type="range" id="nozzleSlider" min="0" max="4" step="1" value="0">
  <div class="row" id="nozzleTimerRow" style="display:none; color:#c98a2b; font-size:0.8rem"><span>Auto-off in</span><span id="nozzleTimer"></span></div>
</div>
<div class="card" id="amsCard" style="display:none">
  <h2>Filament (AMS)</h2>
  <div id="amsSlots"></div>
</div>
<div id="log"></div>
<script>
const $ = id => document.getElementById(id);
const fmt = v => (typeof v === "number" ? v.toFixed(1) : "?");

// Icons that swap with state (the rest are inline in the markup).
const SVG_CAM_ON  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="13" height="12" rx="2"/><path d="M22 8l-5 4 5 4V8z"/></svg>`;
const SVG_CAM_OFF = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="13" height="12" rx="2"/><path d="M22 8l-5 4 5 4V8z"/><line x1="3" y1="3" x2="21" y2="21"/></svg>`;
const SVG_PLAY  = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>`;
const SVG_PAUSE = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>`;

// setIco updates an icon button's glyph and/or caption without clobbering the
// other span (icon buttons hold an .ico and a .cap child).
function setIco(btn, svg, cap) {
  if (svg != null) btn.querySelector(".ico").innerHTML = svg;
  if (cap != null) btn.querySelector(".cap").textContent = cap;
}

// Camera is a manual toggle whose last state persists across reloads, so it
// only pulls the MJPEG feed (and holds the printer's camera connection open) if
// the user left it on. Default off on a fresh browser.
let camOn = localStorage.getItem("camOn") === "1";
function applyCam() {
  const btn = $("camBtn");
  setIco(btn, camOn ? SVG_CAM_ON : SVG_CAM_OFF, camOn ? "Camera on" : "Camera off");
  btn.classList.toggle("on", camOn);
  btn.setAttribute("aria-label", camOn ? "Turn camera off" : "Turn camera on");
  $("camCard").style.display = camOn ? "" : "none";
  const cam = $("cam");
  // Setting src starts the stream; clearing it drops the connection.
  if (camOn) { if (cam.getAttribute("src") !== "/camera/stream") cam.src = "/camera/stream"; }
  else { cam.removeAttribute("src"); }
}
$("camBtn").addEventListener("click", () => {
  camOn = !camOn;
  localStorage.setItem("camOn", camOn ? "1" : "0");
  applyCam();
});
applyCam();

// Declared up here (not by the stop-button wiring below) because refresh() can
// call disarmStop() on its very first, synchronous run — before that wiring
// executes — which would otherwise hit the temporal dead zone.
let stopTimer = null;

// Countdown text: "23h 59m" while over an hour, "14:32" (m:ss) under it.
function fmtCountdown(secs) {
  if (secs >= 3600) {
    return `${Math.floor(secs / 3600)}h ${Math.floor((secs % 3600) / 60)}m`;
  }
  return `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, "0")}`;
}

function showTimer(rowId, valId, secs) {
  const active = typeof secs === "number";
  $(rowId).style.display = active ? "" : "none";
  if (active) $(valId).textContent = fmtCountdown(secs);
}

// amsHumidityText reports whatever the unit sends without inventing units or a
// good/bad scale we can't verify: a raw RH% (newer AMS) and/or a 1-5 level.
function amsHumidityText(unit) {
  const parts = [];
  const raw = unit.humidity_raw;
  if (typeof raw === "number" || (typeof raw === "string" && raw !== "")) parts.push(`${raw}%`);
  const level = unit.humidity;
  if (typeof level === "number" || (typeof level === "string" && level !== "")) parts.push(`level ${level}`);
  return parts.join(" · ");
}

// amsTarget is the global tray index for ams_change_filament, computed from the
// reported ids (ams_id*4 + tray_id) rather than DOM position, so a sparse or
// reordered report still targets the right slot. null if ids aren't usable.
function amsTarget(unit, slot) {
  const u = parseInt(unit && unit.id, 10);
  const t = parseInt(slot && slot.id, 10);
  if (!Number.isInteger(u) || !Number.isInteger(t) || t < 0 || t > 3) return null;
  return u * 4 + t;
}

// loadedTray returns the global index of the tray currently fed to the nozzle
// (ams.tray_now), or null when nothing is loaded. Bambu uses 254 (external
// spool) and 255 (none) as sentinels, so anything >= 254 means "not an AMS
// tray".
function loadedTray(ams) {
  const n = parseInt(ams && ams.tray_now, 10);
  return Number.isInteger(n) && n < 254 ? n : null;
}

function renderAms(ams) {
  const card = $("amsCard");
  const container = $("amsSlots");
  const loadedIdx = loadedTray(ams);
  const units = ams && Array.isArray(ams.ams) ? ams.ams : [];
  const valid = units.filter(u => u && typeof u === "object" && Array.isArray(u.tray));
  if (!valid.some(u => u.tray.length > 0)) {
    card.style.display = "none";
    return;
  }
  card.style.display = "";
  container.innerHTML = "";
  valid.forEach(unit => {
    const hum = amsHumidityText(unit);
    if (hum) {
      const row = document.createElement("div");
      row.className = "row";
      const label = document.createElement("span");
      label.textContent = "Humidity";
      const val = document.createElement("span");
      val.textContent = hum;
      row.append(label, val);
      container.appendChild(row);
    }
    unit.tray.forEach(slot => {
      if (!slot || typeof slot !== "object") return;
      const hasFilament = typeof slot.tray_type === "string" && slot.tray_type !== "";
      const colorHex = typeof slot.tray_color === "string" ? slot.tray_color.slice(0, 6) : "666666";
      const row = document.createElement("div");
      row.className = "ams-slot";
      const swatch = document.createElement("span");
      swatch.className = "ams-swatch";
      swatch.style.background = "#" + colorHex;
      row.appendChild(swatch);
      row.appendChild(document.createTextNode(hasFilament ? slot.tray_type : "empty"));
      // The printer handles loading itself; the AMS card is informational.
      // Mark whichever tray is currently fed to the nozzle so the Eject button
      // has an obvious referent.
      if (hasFilament && amsTarget(unit, slot) === loadedIdx) {
        const tag = document.createElement("span");
        tag.textContent = "loaded";
        tag.style.cssText = "margin-left:auto; font-size:0.72rem; font-weight:600; color:#c98a2b";
        row.appendChild(tag);
      }
      container.appendChild(row);
    });
  });
}

// Bed-drying presets from Bambu's official P1S bed-drying table
// (wiki.bambulab.com/en/filament-acc/filament/dry-filament): PLA 60-70,
// PLA-CF/silk 65-75, PETG 75-85, TPU 80-90, support-ABS 85-95,
// ABS/ASA/PC/PVA/PA/PET-CF 90-100. PPA-CF/PPS-CF want 110-120, which the P1S
// bed can't reach — those need a dedicated dryer.
const DRY_STOPS = [
  { t: 0,   label: "Off" },
  { t: 60,  label: "60°C · PLA" },
  { t: 70,  label: "70°C · PLA-CF/silk" },
  { t: 80,  label: "80°C · PETG" },
  { t: 85,  label: "85°C · TPU" },
  { t: 90,  label: "90°C · ABS/ASA/PC" },
  { t: 100, label: "100°C · PA/PVA/desiccant" },
];
let dryDragging = false;

// Mirror the printer's reported bed target onto the slider by snapping to
// the nearest preset.
function setDrySliderFromTarget(target) {
  const t = typeof target === "number" ? target : 0;
  let best = 0, bestDiff = Infinity;
  DRY_STOPS.forEach((stop, i) => {
    const d = Math.abs(stop.t - t);
    if (d < bestDiff) { bestDiff = d; best = i; }
  });
  $("drySlider").value = best;
  $("dryLabel").textContent = DRY_STOPS[best].label;
}

$("drySlider").addEventListener("input", () => {
  dryDragging = true;
  $("dryLabel").textContent = DRY_STOPS[Number($("drySlider").value)].label;
});
$("drySlider").addEventListener("change", () => {
  dryDragging = false;
  post(`set-bed-temp?temp=${DRY_STOPS[Number($("drySlider").value)].t}`);
});

// Nozzle presets for cleaning / cold pulls. Bambu's cold-pull guide
// (wiki.bambulab.com/en/p1/manual/p1s-cold-pull) sets the nozzle slightly
// above the material's print temp before extruding, so these are print temp
// + ~5°C: PLA 225, PETG 255, ABS/ASA/PC 275, PA/CF 295.
const NOZZLE_STOPS = [
  { t: 0,   label: "Off" },
  { t: 225, label: "225°C · PLA" },
  { t: 255, label: "255°C · PETG" },
  { t: 275, label: "275°C · ABS/PC" },
  { t: 295, label: "295°C · PA/CF" },
];
let nozzleDragging = false;

function setNozzleSliderFromTarget(target) {
  const t = typeof target === "number" ? target : 0;
  let best = 0, bestDiff = Infinity;
  NOZZLE_STOPS.forEach((stop, i) => {
    const d = Math.abs(stop.t - t);
    if (d < bestDiff) { bestDiff = d; best = i; }
  });
  $("nozzleSlider").value = best;
  $("nozzleLabel").textContent = NOZZLE_STOPS[best].label;
}

$("nozzleSlider").addEventListener("input", () => {
  nozzleDragging = true;
  $("nozzleLabel").textContent = NOZZLE_STOPS[Number($("nozzleSlider").value)].label;
});
$("nozzleSlider").addEventListener("change", () => {
  nozzleDragging = false;
  post(`set-nozzle-temp?temp=${NOZZLE_STOPS[Number($("nozzleSlider").value)].t}`);
});

// Demo mode: preview the UI live without a printer. Default (?demo) is an idle
// printer — the state where drying/cleaning/load actually apply — so every
// control is genuinely usable. ?demo=print shows a running job instead, with
// controls correctly locked exactly as real hardware locks them mid-print.
const demoParams = new URLSearchParams(location.search);
const DEMO = demoParams.has("demo");
const DEMO_PRINT = demoParams.get("demo") === "print";
let demoTick = 0;
// Demo targets are mutable so the sliders actually do something: in the idle
// demo the controls are enabled and their changes update these locally.
let demoBedTarget = 60, demoNozzleTarget = 225;
let demoBedSetTick = 0, demoNozzleSetTick = 0; // demoTick when each was last set
let demoLampOn = true;
function demoStatus() {
  demoTick++;
  const base = {
    connected: true,
    bedTemp: (demoBedTarget || 22) - 0.6 + Math.sin(demoTick) * 0.3, bedTarget: demoBedTarget,
    nozzleTemp: (demoNozzleTarget || 24) - 1 + Math.sin(demoTick) * 1.2, nozzleTarget: demoNozzleTarget,
    chamberTemp: 28.6, wifiSignal: "-46dBm", chamberLight: demoLampOn,
    // Each demo refresh ≈ 2s, so convert elapsed ticks to seconds remaining.
    bedOffIn: demoBedTarget > 0 ? Math.max(0, 86400 - (demoTick - demoBedSetTick) * 2) : null,
    nozzleOffIn: demoNozzleTarget > 0 ? Math.max(0, 900 - (demoTick - demoNozzleSetTick) * 2) : null,
    fans: { cooling: 15, aux: 0, chamber: 8 },
    ams: { tray_now: "0", ams: [{ id: "0", humidity: "2", humidity_raw: "24", tray: [
      { id: "0", tray_type: "PLA",  tray_color: "FF6B35FF" },
      { id: "1", tray_type: "PETG", tray_color: "2E86ABFF" },
      { id: "2", tray_type: "ABS",  tray_color: "111418FF" },
      { id: "3", tray_type: "PLA",  tray_color: "F2F2F2FF" },
    ] }] },
    hms: [],
  };
  if (DEMO_PRINT) {
    const total = 240, layer = Math.min(total, 20 + demoTick * 2);
    return { ...base, gcodeState: "RUNNING", actionsAllowed: false,
      progress: Math.min(99, Math.round((layer / total) * 100)),
      jobName: "demo_benchy.3mf", layerNum: layer, totalLayerNum: total,
      remainingMinutes: Math.max(1, Math.round((total - layer) * 0.6)),
      printActions: { pause: true, resume: false, stop: true } };
  }
  return { ...base, gcodeState: "IDLE", actionsAllowed: true,
    progress: null, jobName: null,
    printActions: { pause: false, resume: false, stop: false } };
}
if (DEMO) $("title").textContent += DEMO_PRINT ? " · demo (printing)" : " · demo (idle)";

async function refresh() {
  try {
    let s;
    if (DEMO) {
      s = demoStatus();
    } else {
      const r = await fetch("/api/status");
      s = await r.json();
    }
    $("conn").textContent = s.connected ? "connected" : "disconnected";
    $("conn").className = s.connected ? "ok" : "bad";
    $("state").textContent = s.gcodeState;
    $("bed").textContent = `${fmt(s.bedTemp)} / ${fmt(s.bedTarget)}°C`;
    $("nozzle").textContent = `${fmt(s.nozzleTemp)} / ${fmt(s.nozzleTarget)}°C`;
    const p = s.progress;
    $("jobEmpty").style.display = (p != null || s.jobName) ? "none" : "";
    $("progressRow").style.display = p == null ? "none" : "";
    if (p != null) $("progress").textContent = `${p}%`;
    $("jobRow").style.display = s.jobName ? "" : "none";
    if (s.jobName) $("jobName").textContent = s.jobName;
    const hasLayers = s.totalLayerNum != null && s.totalLayerNum > 0;
    $("layerRow").style.display = hasLayers ? "" : "none";
    if (hasLayers) $("layer").textContent = `${s.layerNum ?? "?"} / ${s.totalLayerNum}`;
    $("timeRow").style.display = s.remainingMinutes != null ? "" : "none";
    if (s.remainingMinutes != null) $("timeRemaining").textContent = `${s.remainingMinutes} min`;
    $("chamber").textContent = fmt(s.chamberTemp) + "°C";
    $("wifi").textContent = s.wifiSignal ?? "?";
    const fans = s.fans || {};
    $("fans").textContent = `${fans.cooling ?? "?"} / ${fans.aux ?? "?"} / ${fans.chamber ?? "?"}`;
    renderAms(s.ams);
    const hms = Array.isArray(s.hms) ? s.hms : [];
    const banner = $("hmsBanner");
    if (hms.length === 0) {
      banner.style.display = "none";
    } else {
      banner.style.display = "";
      banner.textContent = hms.map(e => `⚠️ ${e.message}`).join(" · ");
    }
    // The drying and nozzle cards are idle-only tools. During a print the
    // printer drives bed/nozzle temps itself, so the sliders would show a
    // preset that disagrees with the live machine status (e.g. slider 60 vs
    // bed 55). Hide them entirely unless the printer is idle and reachable.
    $("dryCard").style.display = s.actionsAllowed ? "" : "none";
    $("nozzleCard").style.display = s.actionsAllowed ? "" : "none";
    // Sliders mirror the printer's targets unless the user is dragging them.
    if (!dryDragging) setDrySliderFromTarget(s.bedTarget);
    $("drySlider").disabled = !s.actionsAllowed;
    if (!nozzleDragging) setNozzleSliderFromTarget(s.nozzleTarget);
    $("nozzleSlider").disabled = !s.actionsAllowed;
    showTimer("dryTimerRow", "dryTimer", s.bedOffIn);
    showTimer("nozzleTimerRow", "nozzleTimer", s.nozzleOffIn);
    document.querySelectorAll("[data-action]").forEach(b => b.disabled = !s.actionsAllowed);
    // Extrude also needs a hot nozzle (cold extrusion strips filament); the
    // printer enforces this too, but disable the button to make it obvious.
    $("extrudeBtn").disabled = !s.actionsAllowed || (s.nozzleTemp ?? 0) < 170;
    // Eject unloads the currently-fed filament; grey it out when nothing is
    // loaded (no tray_now) or the printer is busy.
    $("ejectBtn").disabled = !s.actionsAllowed || loadedTray(s.ams) == null;
    // Lamp toggles in any state, so it's gated on connection only. chamberLight
    // is null until the printer reports it — stay neutral and disabled until
    // then rather than assert a state we haven't seen.
    const lampKnown = typeof s.chamberLight === "boolean";
    const lampOn = s.chamberLight === true;
    const lamp = $("lampBtn");
    lamp.dataset.lamp = lampOn ? "lamp-off" : "lamp-on";
    setIco(lamp, null, lampKnown ? (lampOn ? "Lamp on" : "Lamp off") : "Lamp");
    lamp.classList.toggle("on", lampOn);
    lamp.setAttribute("aria-label", lampOn ? "Turn chamber lamp off" : "Turn chamber lamp on");
    lamp.disabled = !s.connected || !lampKnown;

    // Pause button toggles to Resume (play icon) while the print is paused.
    const pa = s.printActions || {};
    const pause = $("pauseBtn");
    const paused = pa.resume;
    pause.dataset.printAction = paused ? "resume" : "pause";
    setIco(pause, paused ? SVG_PLAY : SVG_PAUSE, paused ? "Resume" : "Pause");
    pause.setAttribute("aria-label", paused ? "Resume print" : "Pause print");
    document.querySelectorAll("[data-print-action]").forEach(b => {
      b.disabled = !pa[b.dataset.printAction];
    });
    if (!pa.stop) disarmStop();
  } catch {
    $("conn").textContent = "bridge unreachable";
    $("conn").className = "bad";
    document.querySelectorAll("[data-action], [data-print-action]").forEach(b => b.disabled = true);
    $("dryCard").style.display = "none";
    $("nozzleCard").style.display = "none";
    $("drySlider").disabled = true;
    $("nozzleSlider").disabled = true;
    $("lampBtn").disabled = true;
    // Don't leave a frozen countdown implying a timer we can no longer confirm.
    $("dryTimerRow").style.display = "none";
    $("nozzleTimerRow").style.display = "none";
  }
}
refresh();
setInterval(refresh, 2000);

async function post(action) {
  // In demo there is no printer: apply slider changes locally, no-op the rest.
  if (DEMO) {
    if (action === "lamp-on" || action === "lamp-off") {
      demoLampOn = action === "lamp-on";
      $("log").textContent = `demo: lamp ${demoLampOn ? "on" : "off"}`;
      return;
    }
    const lm = action.match(/^load\?slot=(\d+)/);
    if (lm) {
      $("log").textContent = `demo: load slot ${lm[1]}`;
      return;
    }
    const m = action.match(/^set-(bed|nozzle)-temp\?temp=(\d+)/);
    if (m) {
      const t = Number(m[2]);
      if (m[1] === "bed") { demoBedTarget = t; demoBedSetTick = demoTick; }
      else { demoNozzleTarget = t; demoNozzleSetTick = demoTick; }
      $("log").textContent = `demo: set ${m[1]} to ${t}°C`;
    } else {
      $("log").textContent = `demo: ${action} (no printer connected)`;
    }
    return;
  }
  try {
    const r = await fetch(`/api/actions/${action}`, { method: "POST" });
    $("log").textContent = await r.text();
  } catch {
    $("log").textContent = "request failed";
  }
}

document.querySelectorAll("[data-action]").forEach(b =>
  b.addEventListener("click", () => post(b.dataset.action)));

$("lampBtn").addEventListener("click", () => post($("lampBtn").dataset.lamp));

// Stop kills the print, so it takes two taps: the first arms the button for
// 4 seconds, the second actually sends.
function disarmStop() {
  const b = $("stopBtn");
  b.classList.remove("armed");
  setIco(b, null, "Stop");
  if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
}

document.querySelectorAll("[data-print-action]").forEach(b =>
  b.addEventListener("click", () => {
    if (b.dataset.printAction !== "stop") { post(b.dataset.printAction); return; }
    if (b.classList.contains("armed")) {
      disarmStop();
      post("stop");
    } else {
      b.classList.add("armed");
      setIco(b, null, "Confirm?");
      stopTimer = setTimeout(disarmStop, 4000);
    }
  }));
</script>
</body>
</html>
